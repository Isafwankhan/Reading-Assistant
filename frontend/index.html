<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Comfort Assistant</title>
<style>
  /* ===== Theme Variables ===== */
  :root{
    --bg:#0e0f12; --panel:#16181d; --text:#e7e7e2; --muted:#9aa0a6;
    --accent:#5ee0c0; --accent2:#e05e9d; --border:#26282e;
    --font-serif: 'Georgia', 'Times New Roman', serif;
    --font-sans: -apple-system, 'Segoe UI', Roboto, sans-serif;
    --article-font-size: 1.08rem;
    --radius: 12px;
    --radius-sm: 8px;
  }
  [data-theme="sepia"]{
    --bg:#f1e7d0; --panel:#e9dcc0; --text:#3b2f1e; --muted:#6b5d44;
    --accent:#a3722d; --accent2:#7a4a2b; --border:#d8c8a4;
  }
  [data-theme="contrast"]{
    --bg:#000000; --panel:#0a0a0a; --text:#ffffff; --muted:#cccccc;
    --accent:#ffd400; --accent2:#00e5ff; --border:#444444;
  }
  [data-theme="dyslexia"]{
    --bg:#fbf0d9; --panel:#f5e6c8; --text:#222222; --muted:#555;
    --accent:#1d6f5c; --accent2:#a83232; --border:#e0cfa0;
    --font-serif: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
  }

  /* ===== Reset & Base ===== */
  *, *::before, *::after { box-sizing: border-box; }
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family: var(--font-sans);
    transition: background .25s, color .25s;
  }
  .app{ max-width:880px; margin:0 auto; padding:24px 20px 60px; }

  /* ===== Header ===== */
  header{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; margin-bottom:20px; flex-wrap:wrap;
  }
  h1{ font-size:1.2rem; margin:0; letter-spacing:.3px; white-space:nowrap; }
  h1 span{ color:var(--accent); }
  .header-controls{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

  /* ===== Shared Element Styles ===== */
  select, button, input, .btn{
    background:var(--panel); color:var(--text); border:1px solid var(--border);
    border-radius:var(--radius-sm); padding:7px 12px; font-size:.85rem;
    cursor:pointer; transition: border-color .2s, background .2s, opacity .2s;
  }
  button:hover, .btn:hover{ border-color:var(--accent); }
  button:active, .btn:active{ opacity:.7; }
  button.primary{
    background:var(--accent); color:#0e0f12; font-weight:600; border:none;
  }
  button.primary:hover{ filter:brightness(1.1); }
  button.small{ padding:4px 10px; font-size:.8rem; }
  input{ cursor:text; }
  select{ cursor:pointer; }

  /* ===== URL Bar ===== */
  .url-bar{ display:flex; gap:8px; margin-bottom:6px; }
  .url-bar input{ flex:1; }

  /* ===== Status ===== */
  .status{ font-size:.82rem; margin-bottom:14px; min-height:1.2em; }
  .status.loading{ color:var(--accent); }
  .status.error{ color:var(--accent2); }

  /* ===== Cards ===== */
  .card{
    background:var(--panel); border:1px solid var(--border);
    border-radius:var(--radius); padding:18px; margin-bottom:14px;
  }
  .card h2{
    font-size:.85rem; text-transform:uppercase; letter-spacing:.08em;
    color:var(--muted); margin:0 0 12px;
  }

  /* ===== Stats Bar ===== */
  .stats-bar{
    display:flex; gap:12px; flex-wrap:wrap; align-items:center;
    font-size:.82rem; color:var(--muted);
  }
  .stats-bar .stat{ display:flex; gap:4px; align-items:center; }
  .stats-bar .stat b{ color:var(--text); font-weight:600; }
  .stat-divider{ color:var(--border); }

  /* ===== TTS Bar ===== */
  .tts-bar{
    display:flex; gap:6px; align-items:center; flex-wrap:wrap;
    padding-top:10px; margin-top:10px; border-top:1px solid var(--border);
  }
  .tts-bar .tts-label{ font-size:.78rem; color:var(--muted); margin-right:4px; }
  .tts-btn{ padding:5px 10px; font-size:.8rem; }

  /* ===== Progress Bar ===== */
  .progress-track{
    height:3px; background:var(--border); border-radius:2px;
    margin-bottom:12px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background:var(--accent); border-radius:2px;
    transition: width .35s ease; width:0%;
  }

  /* ===== Article ===== */
  #contentTitle{
    font-size:1.15rem; font-weight:600; color:var(--text);
    text-transform:none; letter-spacing:normal; margin-bottom:8px;
  }
  #imageGallery{
    display:flex; gap:8px; overflow-x:auto; padding-bottom:8px;
    margin-bottom:12px; scroll-snap-type:x mandatory;
  }
  #imageGallery img{
    height:160px; border-radius:var(--radius-sm); object-fit:cover;
    scroll-snap-align:start; border:1px solid var(--border);
    flex-shrink:0; cursor:pointer; transition:transform .2s;
  }
  #imageGallery img:hover{ transform:scale(1.02); }
  #imageGallery::-webkit-scrollbar{ height:4px; }
  #imageGallery::-webkit-scrollbar-thumb{ background:var(--border); border-radius:2px; }

  article#content{
    font-family: var(--font-serif); font-size:var(--article-font-size);
    line-height:1.75;
  }
  article#content p{ margin:0 0 1em; }
  article#content p:last-child{ margin-bottom:0; }

  /* ===== Section Nav ===== */
  .section-nav{
    display:flex; align-items:center; justify-content:space-between;
    margin-top:14px; gap:8px;
  }
  .section-nav .chunk-info{ font-size:.8rem; color:var(--muted); min-width:120px; text-align:center; }
  .section-nav .nav-btn{ padding:6px 14px; min-width:100px; }

  /* ===== Floating Explain Button ===== */
  .float-explain{
    position:fixed; background:var(--accent); color:#0e0f12;
    border:none; border-radius:var(--radius-sm); padding:6px 14px;
    font-size:.82rem; font-weight:600; cursor:pointer; z-index:100;
    box-shadow:0 4px 12px rgba(0,0,0,.3); pointer-events:auto;
    transition:opacity .2s; white-space:nowrap;
  }
  .float-explain:hover{ filter:brightness(1.1); }

  /* ===== Explain Output ===== */
  .explain-box{
    border-left:3px solid var(--accent2); padding:10px 14px;
    margin-top:10px; font-size:.92rem;
    background:rgba(255,255,255,0.03); border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  }
  .explain-box .close-explain{
    float:right; cursor:pointer; opacity:.5; font-size:.8rem;
  }
  .explain-box .close-explain:hover{ opacity:1; }

  /* ===== AI Tools ===== */
  .mode-pills{ display:flex; gap:4px; flex-wrap:wrap; margin-bottom:10px; }
  .mode-pills button{ font-size:.78rem; padding:4px 10px; }
  .mode-pills button.active{
    background:var(--accent); color:#0e0f12; border-color:var(--accent); font-weight:600;
  }
  .action-bar{
    display:flex; gap:4px; flex-wrap:wrap; margin-bottom:10px;
  }
  .action-bar button{ font-size:.78rem; padding:4px 10px; }

  /* ===== Loading Skeleton ===== */
  @keyframes shimmer{
    0%{ background-position:-200px 0; }
    100%{ background-position:calc(200px + 100%) 0; }
  }
  .skeleton{
    height:14px; border-radius:4px; margin-bottom:8px;
    background:linear-gradient(90deg, var(--border) 25%, var(--panel) 50%, var(--border) 75%);
    background-size:200px 100%;
    animation:shimmer 1.4s ease-in-out infinite;
  }
  .skeleton:last-child{ margin-bottom:0; }
  .skeleton.wide{ width:90%; }
  .skeleton.narrow{ width:60%; }

  /* ===== AI Output Container ===== */
  #aiOutput{ min-height:20px; }
  #aiOutput .section-label{ font-size:.82rem; font-weight:600; color:var(--accent); margin-bottom:8px; display:block; }

  /* ===== Key Points / Facts lists ===== */
  ul.kp{ margin:0; padding-left:1.2em; }
  ul.kp li{ margin-bottom:5px; font-size:.9rem; line-height:1.5; }

  /* ===== Quiz ===== */
  .qa-item{
    margin-bottom:10px; padding:12px; border:1px solid var(--border);
    border-radius:var(--radius-sm);
  }
  .qa-item .q-text{ font-weight:600; margin-bottom:6px; font-size:.9rem; }
  .qa-item .q-options{ list-style:none; padding:0; margin:0 0 6px; }
  .qa-item .q-options li{
    padding:5px 8px; margin-bottom:3px; border-radius:4px;
    font-size:.85rem; border:1px solid transparent; cursor:pointer;
    transition:background .15s;
  }
  .qa-item .q-options li:hover{ background:rgba(255,255,255,.04); }
  .qa-item .q-options li.selected{ border-color:var(--accent); }
  .qa-item .q-options li.correct{ border-color:var(--accent); background:rgba(94,224,192,.1); }
  .qa-item .q-options li.wrong{ border-color:var(--accent2); background:rgba(224,94,157,.1); }
  .qa-item .q-feedback{ font-size:.8rem; margin-top:4px; }
  .qa-item .q-answer{ color:var(--accent); }
  .qa-item .q-answer.hidden{ display:none; }
  .quiz-score{ font-size:.85rem; color:var(--muted); margin-top:8px; }

  /* ===== Knowledge Graph ===== */
  .kg-container{
    position:relative; display:flex; flex-wrap:wrap; gap:10px;
    padding:16px 8px; justify-content:center;
  }
  .kg-concept{
    background:var(--panel); border:1px solid var(--border);
    border-radius:var(--radius-sm); padding:10px 14px;
    width:180px; flex-shrink:0; border-top:3px solid var(--accent);
    transition:border-color .2s, transform .2s;
  }
  .kg-concept:hover{ border-color:var(--accent); transform:translateY(-2px); }
  .kg-concept .kg-name{ font-weight:600; font-size:.85rem; margin-bottom:4px; }
  .kg-concept .kg-desc{ font-size:.78rem; color:var(--muted); line-height:1.4; }
  .kg-concept .kg-related{ margin-top:6px; font-size:.75rem; }
  .kg-concept .kg-related span{
    display:inline-block; background:var(--border); padding:1px 6px;
    border-radius:3px; margin:2px 3px 2px 0; font-size:.72rem;
  }
  .kg-topic{
    text-align:center; width:100%; font-size:.9rem; color:var(--muted);
    margin-bottom:6px;
  }
  .kg-topic b{ color:var(--text); }

  /* ===== Footer ===== */
  footer{ text-align:center; color:var(--muted); font-size:.72rem; margin-top:30px; }

  /* ===== Utility ===== */
  .mb-0{ margin-bottom:0; }
  .mt-1{ margin-top:8px; }
  .flex{ display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .gap-4{ gap:4px; }
  ::selection{ background:var(--accent); color:#0e0f12; }

  /* ===== Responsive ===== */
  @media(max-width:600px){
    .app{ padding:16px 12px 40px; }
    .stats-bar{ font-size:.78rem; gap:8px; }
    .section-nav .nav-btn{ min-width:auto; padding:6px 10px; font-size:.8rem; }
    h1{ font-size:1rem; }
    #imageGallery img{ height:120px; }
    .kg-concept{ width:100%; }
  }
</style>
</head>
<body data-theme="dark">
<div class="app">
  <header>
    <h1>Reading<span>Comfort</span>Assistant</h1>
    <div class="header-controls">
      <select id="fontSizeSelect">
        <option value="small">Small</option>
        <option value="medium" selected>Medium</option>
        <option value="large">Large</option>
      </select>
      <select id="themeSelect">
        <option value="dark">Dark Mode</option>
        <option value="sepia">Sepia Mode</option>
        <option value="contrast">High Contrast</option>
        <option value="dyslexia">Dyslexia-Friendly</option>
      </select>
    </div>
  </header>

  <div class="url-bar">
    <input id="urlInput" type="text" placeholder="Paste an article URL, e.g. https://example.com/article" />
    <button class="primary" id="loadBtn">Read</button>
  </div>
  <div id="loadStatus" class="status"></div>

  <div id="resultArea" style="display:none;">

    <!-- Stats & TTS -->
    <div class="card">
      <div class="stats-bar" id="statsBar"></div>
      <div class="tts-bar" id="ttsBar">
        <span class="tts-label">🔊 TTS</span>
        <button class="tts-btn" id="ttsPlay">▶ Play</button>
        <button class="tts-btn" id="ttsPause">⏸ Pause</button>
        <button class="tts-btn" id="ttsStop">⏹ Stop</button>
        <select id="ttsRate" class="small">
          <option value="0.8">0.8x</option>
          <option value="1" selected>1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
        </select>
        <span class="hint" style="font-size:.75rem;margin-left:auto;" id="shortcutHint">n/p: nav • t: TTS • r: reset</span>
      </div>
    </div>

    <!-- Article -->
    <div class="card">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <h2 id="contentTitle">Article</h2>
      <div id="imageGallery"></div>
      <article id="content"></article>
      <div class="section-nav">
        <button class="nav-btn" id="prevChunk">◀ Prev</button>
        <span class="chunk-info" id="chunkLabel"></span>
        <button class="nav-btn" id="nextChunk">Next ▶</button>
      </div>
      <div id="explainOutput"></div>
    </div>
    <button class="float-explain" id="floatExplainBtn" style="display:none;">💡 Explain</button>

    <!-- AI Tools -->
    <div class="card">
      <h2>AI Tools</h2>

      <div class="mode-pills" id="modeTabs">
        <button data-mode="original" class="active">Original</button>
        <button data-mode="student">Student</button>
        <button data-mode="professional">Professional</button>
        <button data-mode="child">Child</button>
        <button data-mode="quickscan">Quick Scan</button>
      </div>

      <div class="action-bar" id="actionBar">
        <button data-action="summarize" data-len="short">Short Summary</button>
        <button data-action="summarize" data-len="medium">Medium Summary</button>
        <button data-action="summarize" data-len="detailed">Detailed Summary</button>
        <button data-action="highlights">Highlights</button>
        <button data-action="quiz">Quiz</button>
        <button data-action="knowledge-graph">Knowledge Graph</button>
      </div>

      <div id="aiOutput"></div>
    </div>

  </div>

  <footer>AI Reading Comfort Assistant — FastAPI + Groq LLM</footer>
</div>

<script>
/* ===== Constants & State ===== */
const API = "";
const FONT_SIZES = { small: '.95rem', medium: '1.08rem', large: '1.25rem' };
let state = {
  title: "", chunks: [], currentChunk: 0, fullText: "",
  originalChunks: [], images: [], wordCount: 0
};
let utterance = null;

/* ===== DOM refs ===== */
const $ = id => document.getElementById(id);
const themeSelect = $('themeSelect');
const fontSizeSelect = $('fontSizeSelect');
const urlInput = $('urlInput');
const loadBtn = $('loadBtn');
const loadStatus = $('loadStatus');
const resultArea = $('resultArea');
const statsBar = $('statsBar');
const contentTitle = $('contentTitle');
const contentEl = $('content');
const imageGallery = $('imageGallery');
const chunkLabel = $('chunkLabel');
const progressFill = $('progressFill');
const aiOutput = $('aiOutput');
const explainOutput = $('explainOutput');
const floatExplain = $('floatExplainBtn');
const prevBtn = $('prevChunk');
const nextBtn = $('nextChunk');

/* ===== Theme & Font Size ===== */
themeSelect.addEventListener('change', () => {
  document.body.setAttribute('data-theme', themeSelect.value);
});
fontSizeSelect.addEventListener('change', () => {
  document.body.style.setProperty('--article-font-size', FONT_SIZES[fontSizeSelect.value]);
});

/* ===== URL Load ===== */
loadBtn.addEventListener('click', loadArticle);
urlInput.addEventListener('keydown', e => { if(e.key === 'Enter') loadArticle(); });

async function loadArticle(){
  const url = urlInput.value.trim();
  if(!url) return;
  setStatus("Fetching and cleaning article (Focus Mode)...", "loading");
  resultArea.style.display = "none";

  try{
    const res = await fetch(`${API}/api/extract`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({url})
    });
    let data;
    try { data = await res.json(); } catch { data = null; }
    if(!res.ok) throw new Error(data?.detail || `Server error (${res.status})`);

    state.title = data.title;
    state.fullText = data.text;
    state.chunks = data.chunks.map(c => c.text);
    state.originalChunks = [...state.chunks];
    state.currentChunk = 0;
    state.images = data.images || [];
    state.wordCount = data.word_count;

    contentTitle.textContent = data.title;
    renderStats(data);
    renderImages(data.images);
    renderChunk();
    resultArea.style.display = "block";
    setStatus("", "");

    // trigger analysis in background
    analyzeDifficulty(data.text);
  }catch(err){
    setStatus(err.message, "error");
  }
}

function setStatus(msg, cls){
  loadStatus.textContent = msg;
  loadStatus.className = "status" + (cls ? " " + cls : "");
}

/* ===== Stats ===== */
function renderStats(data){
  statsBar.innerHTML = `
    <span class="stat"><b>${data.word_count}</b> words</span>
    <span class="stat-divider">|</span>
    <span class="stat">Difficulty: <b id="diffLevel">analyzing...</b></span>
    <span class="stat-divider">|</span>
    <span class="stat">Complexity: <b id="diffScore">—</b></span>
    <span class="stat-divider">|</span>
    <span class="stat">Reading time: <b id="readTime">—</b></span>
  `;
}

async function analyzeDifficulty(text){
  try{
    const res = await fetch(`${API}/api/analyze`, {
      method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({text})
    });
    let data;
    try { data = await res.json(); } catch { data = {}; }
    const el = id => document.getElementById(id);
    if(data.level) el('diffLevel').textContent = data.level;
    if(data.complexity_score != null) el('diffScore').textContent = data.complexity_score + '/10';
    if(data.reading_time_minutes != null) el('readTime').textContent = data.reading_time_minutes + ' min';
  }catch(e){ /* stats stay as "analyzing..." — fine */ }
}

/* ===== Image Gallery ===== */
function renderImages(images){
  if(!images || !images.length){ imageGallery.style.display = "none"; return; }
  imageGallery.style.display = "flex";
  imageGallery.innerHTML = images.map(src =>
    `<img src="${src.replace(/['"]/g,'')}" loading="lazy" alt="Article image" onclick="window.open(this.src,'_blank')" />`
  ).join('');
}

/* ===== Chunk Rendering ===== */
function renderChunk(){
  if(!state.chunks.length) return;
  const total = state.chunks.length;
  const text = state.chunks[state.currentChunk] || "";
  // Render as proper paragraphs
  const paras = text.split('\n\n').filter(p => p.trim());
  contentEl.innerHTML = paras.map(p => `<p>${escapeHtml(p.trim())}</p>`).join('');
  chunkLabel.textContent = `Section ${state.currentChunk+1} of ${total}`;
  progressFill.style.width = ((state.currentChunk + 1) / total * 100) + '%';
  // Hide explain output on nav
  explainOutput.innerHTML = "";
}

function escapeHtml(str){
  const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
  return str.replace(/[&<>"']/g, c => map[c]);
}

/* ===== Section Navigation ===== */
prevBtn.onclick = () => {
  if(state.currentChunk > 0){ state.currentChunk--; renderChunk(); }
};
nextBtn.onclick = () => {
  if(state.currentChunk < state.chunks.length-1){ state.currentChunk++; renderChunk(); }
};

/* ===== Floating Explain Button ===== */
let explainTimer = null;
document.addEventListener('mouseup', (e) => {
  clearTimeout(explainTimer);
  explainTimer = setTimeout(() => {
    const sel = window.getSelection().toString().trim();
    if(sel && state.fullText){
      const range = window.getSelection().getRangeAt(0);
      const rect = range.getBoundingClientRect();
      floatExplain.style.display = "block";
      floatExplain.style.left = Math.min(rect.left + rect.width/2 - 40, window.innerWidth - 120) + 'px';
      floatExplain.style.top = (rect.bottom + 8) + 'px';
    } else {
      floatExplain.style.display = "none";
    }
  }, 200);
});
document.addEventListener('mousedown', (e) => {
  if(e.target !== floatExplain) floatExplain.style.display = "none";
});

floatExplain.onclick = async () => {
  const passage = window.getSelection().toString().trim();
  if(!passage) return;
  floatExplain.style.display = "none";
  window.getSelection().removeAllRanges();
  explainOutput.innerHTML = `<div class="loading">Explaining...</div>`;
  try{
    const res = await fetch(`${API}/api/explain`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({passage, context: state.fullText.slice(0,2000)})
    });
    let data;
    try { data = await res.json(); } catch { data = {}; }
    if(!res.ok) throw new Error(data?.detail || `Server error (${res.status})`);
    explainOutput.innerHTML =
      `<div class="explain-box"><span class="close-explain" onclick="this.parentElement.parentElement.innerHTML=''">✕</span>${data.explanation || ''}</div>`;
  }catch(err){
    explainOutput.innerHTML = `<div class="error">${err.message}</div>`;
  }
};

/* ===== Reading Mode Tabs ===== */
$('modeTabs').addEventListener('click', async (e) => {
  const btn = e.target.closest('button');
  if(!btn) return;
  [...$('modeTabs').children].forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const mode = btn.dataset.mode;

  if(mode === 'original'){
    state.chunks = [...state.originalChunks];
    state.currentChunk = 0;
    renderChunk();
    return;
  }

  showSkeleton(1);
  try{
    const res = await fetch(`${API}/api/reading-mode`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({text: state.fullText, mode})
    });
    let data;
    try { data = await res.json(); } catch { data = {}; }
    if(!res.ok) throw new Error(data?.detail || `Server error (${res.status})`);
    aiOutput.innerHTML = "";
    state.chunks = [data.text];
    state.currentChunk = 0;
    renderChunk();
  }catch(err){
    aiOutput.innerHTML = `<div class="error">${err.message}</div>`;
  }
});

/* ===== AI Actions ===== */
$('actionBar').addEventListener('click', async (e) => {
  const btn = e.target.closest('button');
  if(!btn || !state.fullText) return;
  const action = btn.dataset.action;

  if(action === 'summarize') await runSummarize(btn.dataset.len);
  if(action === 'highlights') await runHighlights();
  if(action === 'quiz') await runQuiz();
  if(action === 'knowledge-graph') await runKnowledgeGraph();
});

function showSkeleton(lines){
  aiOutput.innerHTML = Array(lines).fill(0)
    .map((_,i) => `<div class="skeleton ${i % 2 === 0 ? 'wide' : 'narrow'}"></div>`).join('');
}

async function runSummarize(length){
  showSkeleton(4);
  try{
    const res = await fetch(`${API}/api/summarize`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({text: state.fullText, length})
    });
    let data;
    try { data = await res.json(); } catch { data = {}; }
    if(!res.ok) throw new Error(data?.detail || `Server error (${res.status})`);
    aiOutput.innerHTML =
      `<span class="section-label">${length.charAt(0).toUpperCase()+length.slice(1)} Summary</span>` +
      `<p>${(data.summary||'').replace(/\n/g,'<br>')}</p>`;
  }catch(err){
    aiOutput.innerHTML = `<div class="error">${err.message}</div>`;
  }
}

async function runHighlights(){
  showSkeleton(5);
  try{
    const res = await fetch(`${API}/api/highlights`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({text: state.fullText})
    });
    let data;
    try { data = await res.json(); } catch { data = {}; }
    if(!res.ok) throw new Error(data?.detail || `Server error (${res.status})`);
    const kp = data.key_points || [];
    const kf = data.key_facts || [];
    aiOutput.innerHTML = `
      ${kp.length ? `<span class="section-label">Key Points</span><ul class="kp">${kp.map(p=>`<li>${p}</li>`).join('')}</ul>` : ''}
      ${kf.length ? `<span class="section-label" style="margin-top:10px;">Key Facts</span><ul class="kp">${kf.map(p=>`<li>${p}</li>`).join('')}</ul>` : ''}
    `;
  }catch(err){
    aiOutput.innerHTML = `<div class="error">${err.message}</div>`;
  }
}

/* ===== Interactive Quiz ===== */
let quizState = { selected: {}, revealed: {} };

async function runQuiz(){
  showSkeleton(4);
  quizState = { selected: {}, revealed: {} };
  try{
    const res = await fetch(`${API}/api/quiz`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({text: state.fullText, kind:"mcq", count:5})
    });
    let data;
    try { data = await res.json(); } catch { data = {}; }
    if(!res.ok) throw new Error(data?.detail || `Server error (${res.status})`);
    const qs = data.questions || [];
    if(!qs.length){ aiOutput.innerHTML = `<div class="hint">No quiz generated.</div>`; return; }
    aiOutput.innerHTML = qs.map((q,i) => `
      <div class="qa-item" data-q="${i}">
        <div class="q-text">${i+1}. ${q.question}</div>
        <ul class="q-options">${(q.options||[]).map((o,oi) =>
          `<li data-opt="${oi}" onclick="selectQuizOption(${i},${oi},'${q.answer.replace(/'/g,"\\'")}')">${o}</li>`
        ).join('')}</ul>
        <div class="q-feedback"><span class="q-answer hidden" id="qAns${i}">✔ ${q.answer}</span></div>
      </div>
    `).join('') + `<div class="quiz-score" id="quizScore"></div>`;
  }catch(err){
    aiOutput.innerHTML = `<div class="error">${err.message}</div>`;
  }
}

function selectQuizOption(qIdx, optIdx, answer){
  const items = document.querySelectorAll(`.qa-item[data-q="${qIdx}"] .q-options li`);
  if(items[optIdx].classList.contains('correct') || items[optIdx].classList.contains('wrong')) return;
  const letter = String.fromCharCode(65 + optIdx);
  const isCorrect = letter === answer;
  items.forEach(li => li.classList.remove('selected'));
  items[optIdx].classList.add('selected');
  items[optIdx].classList.add(isCorrect ? 'correct' : 'wrong');
  if(!isCorrect){
    items.forEach(li => {
      const liLetter = String.fromCharCode(65 + parseInt(li.dataset.opt));
      if(liLetter === answer) li.classList.add('correct');
    });
  }
  document.getElementById(`qAns${qIdx}`).classList.remove('hidden');
  quizState.selected[qIdx] = optIdx;
  quizState.revealed[qIdx] = true;
  updateQuizScore();
}

function updateQuizScore(){
  const total = document.querySelectorAll('.qa-item').length;
  const correct = document.querySelectorAll('.qa-item .q-options li.correct').length;
  document.getElementById('quizScore').textContent = `Score: ${correct}/${total}`;
}

/* ===== Knowledge Graph ===== */
async function runKnowledgeGraph(){
  showSkeleton(3);
  try{
    const res = await fetch(`${API}/api/knowledge-graph`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({text: state.fullText})
    });
    let data;
    try { data = await res.json(); } catch { data = {}; }
    if(!res.ok) throw new Error(data?.detail || `Server error (${res.status})`);
    const concepts = data.concepts || [];
    if(!concepts.length){ aiOutput.innerHTML = `<div class="hint">No concepts extracted.</div>`; return; }
    aiOutput.innerHTML = `
      <div class="kg-container">
        <div class="kg-topic">Topic: <b>${escapeHtml(data.topic || 'Unknown')}</b></div>
        ${concepts.map(c => `
          <div class="kg-concept">
            <div class="kg-name">${escapeHtml(c.name || '')}</div>
            <div class="kg-desc">${escapeHtml(c.description || '')}</div>
            ${(c.related_to && c.related_to.length) ?
              `<div class="kg-related">Related: ${c.related_to.map(r => `<span>${escapeHtml(r)}</span>`).join('')}</div>` : ''}
          </div>
        `).join('')}
      </div>`;
  }catch(err){
    aiOutput.innerHTML = `<div class="error">${err.message}</div>`;
  }
}

/* ===== Text-to-Speech ===== */
$('ttsPlay').onclick = () => {
  window.speechSynthesis.cancel();
  const text = state.chunks[state.currentChunk] || state.fullText;
  if(!text) return;
  utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = parseFloat($('ttsRate').value);
  window.speechSynthesis.speak(utterance);
};
$('ttsPause').onclick = () => {
  if(window.speechSynthesis.speaking) window.speechSynthesis.pause();
  else window.speechSynthesis.resume();
};
$('ttsStop').onclick = () => window.speechSynthesis.cancel();

/* ===== Keyboard Shortcuts ===== */
document.addEventListener('keydown', (e) => {
  // Don't trigger when typing in input
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if(e.key === 'n' || e.key === 'ArrowRight'){ e.preventDefault(); nextBtn.click(); }
  if(e.key === 'p' || e.key === 'ArrowLeft'){ e.preventDefault(); prevBtn.click(); }
  if(e.key === 't'){ e.preventDefault(); $('ttsPlay').click(); }
  if(e.key === 'r'){
    e.preventDefault();
    const origBtn = document.querySelector('#modeTabs [data-mode="original"]');
    if(origBtn) origBtn.click();
  }
  if(e.key === 'Escape'){
    explainOutput.innerHTML = "";
  }
});
